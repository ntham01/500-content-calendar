<!-- Content Calendar — 500 AI Industry Lab -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--soft:#fbfbfa;--hover:#f6f6f5;
    --ink:#1a1a1a;--ink2:#5c5c5c;--muted:#9b9b97;
    --line:#ececea;--line2:#f4f4f2;
    --p1:#b15a39;--p2:#3a7184;--p3:#a37a2e;--ops:#9a9a96;
    --p1-s:#f8efea;--p2-s:#eef3f5;--p3-s:#f6f1e6;--ops-s:#f2f2f0;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
  .wrap{max-width:1280px;margin:0 auto;padding:48px 32px 110px}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500}

  /* Header */
  header.top{display:flex;justify-content:space-between;align-items:flex-end;gap:32px;flex-wrap:wrap;
    padding-bottom:26px;border-bottom:1px solid var(--line)}
  h1{font-weight:600;font-size:30px;letter-spacing:-.025em;margin:11px 0 6px;line-height:1.05}
  .sub{font-size:14px;color:var(--ink2);max-width:560px}
  .progress{min-width:172px}
  .progress .row1{display:flex;justify-content:flex-end;align-items:baseline;gap:8px;font-variant-numeric:tabular-nums}
  .progress .big{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .progress .big .of{color:var(--muted);font-weight:450;font-size:15px}
  .pbar{height:4px;border-radius:4px;background:var(--line);margin-top:9px;overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:var(--ink);transition:width .45s cubic-bezier(.2,.7,.2,1)}
  .progress .row2{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;font-size:12px;color:var(--muted)}
  #saved{color:var(--ink2)}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between;margin-top:24px}
  .legend{display:flex;flex-wrap:wrap;gap:18px;font-size:13px;color:var(--ink2)}
  .lg{display:flex;align-items:center;gap:8px}
  .lg .sw{width:9px;height:9px;border-radius:50%}
  .lg .sw.p1{background:var(--p1)} .lg .sw.p2{background:var(--p2)}
  .lg .sw.doc{background:var(--p3)} .lg .sw.ops{background:var(--ops)}
  .lg .n{color:var(--muted);font-variant-numeric:tabular-nums}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:12.5px;background:transparent;color:var(--ink2);
    border:1px solid var(--line);border-radius:7px;padding:8px 13px;cursor:pointer;transition:.14s;font-weight:450}
  .btn:hover{border-color:var(--ink2);color:var(--ink)}
  .btn.warn:hover{border-color:var(--p1);color:var(--p1)}

  .hint{font-size:12.5px;color:var(--muted);margin-top:18px;line-height:1.55}
  .hint b{color:var(--ink2);font-weight:500}

  /* Parking lot */
  .tray-wrap{margin-top:8px}
  .tray-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .th-hint{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.5}
  .th-hint b{color:var(--ink2);font-weight:500}
  .tray-actions{margin:0 0 11px}
  .saved-tag{font-size:12px;color:var(--muted);margin-left:6px;align-self:center}
  .addrow{display:flex;gap:7px;align-items:center}
  .addrow input,.addrow select{font-family:var(--sans);font-size:13px;background:var(--bg);
    border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:8px 10px}
  .addrow input{min-width:210px}
  .addrow input::placeholder{color:var(--muted)}
  .addrow select{cursor:pointer;color:var(--ink2)}
  .addrow input:focus,.addrow select:focus{outline:none;border-color:var(--ink2)}
  .tray{display:flex;flex-wrap:wrap;gap:8px;min-height:58px;background:var(--soft);
    border:1px solid var(--line);border-radius:10px;padding:11px}
  .tray.empty{align-items:center}
  .tray.empty::before{content:"Empty. New ideas land here — drag them onto a day to schedule.";
    font-size:12.5px;color:var(--muted)}
  .tray.over{background:var(--p2-s);border-color:var(--p2)}

  /* Calendar */
  .cal-scroll{overflow-x:auto;margin-top:24px;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
  .cal{min-width:940px}
  .colhead{display:grid;grid-template-columns:148px repeat(5,1fr);border-bottom:1px solid var(--line);background:var(--soft)}
  .colhead .ch{padding:11px 14px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .colhead .ch.first{position:sticky;left:0;background:var(--soft);z-index:4}
  .row{display:grid;grid-template-columns:148px repeat(5,1fr);border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}

  .wk-label{position:sticky;left:0;z-index:3;background:var(--bg);border-right:1px solid var(--line);
    padding:14px;display:flex;flex-direction:column;gap:6px}
  .row.now .wk-label{box-shadow:inset 2px 0 0 var(--ink)}
  .wk-no{font-weight:600;font-size:15px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .wk-this{font-size:10.5px;color:var(--muted);font-weight:450}
  .wk-dates{font-size:12px;color:var(--ink2);font-variant-numeric:tabular-nums}
  .wk-phase{font-size:10.5px;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;margin-top:1px}
  .wk-phase .d{width:6px;height:6px;border-radius:50%;background:var(--muted)}
  .wk-phase.pre .d{background:var(--p3)} .wk-phase.prod .d{background:var(--p2)}
  .wk-phase.post .d{background:var(--p1)} .wk-phase.deliv .d{background:var(--ops)}
  .wk-gate{font-size:10.5px;color:var(--p3);display:flex;align-items:center;gap:6px}
  .wk-gate .dia{width:6px;height:6px;border:1px solid var(--p3);transform:rotate(45deg)}

  .cell{border-right:1px solid var(--line2);min-height:118px;display:flex;flex-direction:column;cursor:pointer;position:relative;transition:background .12s}
  .cell:last-child{border-right:none}
  .cell:hover{background:var(--soft)}
  .cell-head{display:flex;align-items:center;justify-content:space-between;padding:9px 11px 5px;pointer-events:none;min-height:26px}
  .cell-head .dn{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .ship-badge{font-size:9.5px;letter-spacing:.05em;font-weight:600;padding:2px 6px;border-radius:4px;display:none}
  .cell.ship-p1{box-shadow:inset 0 2px 0 var(--p1)} .cell.ship-p1 .ship-badge{display:inline-block;background:var(--p1-s);color:var(--p1)}
  .cell.ship-p2{box-shadow:inset 0 2px 0 var(--p2)} .cell.ship-p2 .ship-badge{display:inline-block;background:var(--p2-s);color:var(--p2)}
  .cell.ship-doc{box-shadow:inset 0 2px 0 var(--p3)} .cell.ship-doc .ship-badge{display:inline-block;background:var(--p3-s);color:var(--p3)}
  .cell-body{flex:1;padding:1px 8px 9px;display:flex;flex-direction:column;gap:5px}
  .cell-hint{font-size:10px;color:transparent;text-align:center;padding-bottom:7px;transition:.12s;pointer-events:none}
  .cell:hover .cell-hint{color:var(--muted)}
  .cell.over{background:var(--p2-s)}

  /* Block */
  .block{display:flex;gap:8px;align-items:flex-start;padding:7px 8px;border-radius:7px;background:var(--bg);
    border:1px solid var(--line);border-left:2px solid var(--ops);touch-action:none;cursor:grab;
    user-select:none;transition:box-shadow .12s,border-color .12s}
  .block:hover{box-shadow:0 1px 0 rgba(0,0,0,.03),0 2px 8px rgba(0,0,0,.04);border-color:#e0e0dd}
  .block:active{cursor:grabbing}
  .block.p1{border-left-color:var(--p1)} .block.p2{border-left-color:var(--p2)}
  .block.doc{border-left-color:var(--p3)} .block.ops{border-left-color:var(--ops)}
  .block.dragging{opacity:.3;pointer-events:none}
  .block .box{width:15px;height:15px;border-radius:4px;border:1.5px solid #d6d6d3;flex:none;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;cursor:pointer;transition:.12s}
  .block .box:hover{border-color:var(--ink2)}
  .block .btxt{font-size:12.5px;line-height:1.32;flex:1;min-width:0;color:var(--ink)}
  .block .btxt .pill{font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:1px;font-weight:500}
  .block .rm{flex:none;width:17px;height:17px;border-radius:5px;border:none;background:transparent;color:#c4c4c0;
    cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;margin-top:-1px}
  .block .rm:hover{color:var(--p1);background:var(--p1-s)}
  .block.done{opacity:.55}
  .block.done .btxt{text-decoration:line-through;text-decoration-color:var(--muted);color:var(--ink2)}
  .block.done .box{color:#fff;border-color:transparent}
  .block.done.p1 .box{background:var(--p1)} .block.done.p2 .box{background:var(--p2)}
  .block.done.doc .box{background:var(--p3)} .block.done.ops .box{background:var(--ops)}

  .ghost{position:fixed;z-index:9999;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.14);opacity:.97;background:var(--bg)}

  .bnote{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);
    margin-left:6px;vertical-align:middle;flex:none}

  .scrim{position:fixed;inset:0;background:transparent;z-index:60;display:none}
  .scrim.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:372px;max-width:88vw;background:var(--bg);
    border-left:1px solid var(--line);box-shadow:-18px 0 50px rgba(0,0,0,.10);
    transform:translateX(103%);transition:transform .24s cubic-bezier(.2,.7,.2,1);z-index:61;
    display:flex;flex-direction:column;gap:9px;padding:24px 26px}
  .drawer.open{transform:translateX(0)}
  .drawer-x{position:absolute;top:18px;right:20px;border:none;background:transparent;color:var(--muted);
    font-size:24px;line-height:1;cursor:pointer;padding:0;width:28px;height:28px}
  .drawer-x:hover{color:var(--ink)}
  .d-meta{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink2);margin:2px 0 14px}
  .d-meta .sw{width:9px;height:9px;border-radius:50%;flex:none}
  .d-meta .loc{color:var(--muted)}
  .d-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .d-title{font-family:var(--sans);font-size:15px;font-weight:500;color:var(--ink);border:none;
    border-bottom:1px solid var(--line);padding:7px 0;background:transparent;width:100%}
  .d-title:focus{outline:none;border-color:var(--ink2)}
  .d-desc{font-family:var(--sans);font-size:13.5px;line-height:1.55;color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:12px;min-height:180px;resize:vertical;background:var(--bg);width:100%}
  .d-desc:focus{outline:none;border-color:var(--ink2)}
  .d-desc::placeholder{color:var(--muted)}
  .d-foot{margin-top:auto;padding-top:16px;display:flex;justify-content:space-between;align-items:center}
  .d-saved{font-size:12px;color:var(--muted)}

  .page-head{padding-top:2px}
  .page-head h1{font-weight:600;font-size:27px;letter-spacing:-.025em;margin:0;color:var(--ink)}
  .page-sub{font-size:13px;color:var(--muted);margin-top:5px}
  .rule{border:none;border-top:1px solid var(--line);margin:20px 0 24px}

  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;
    border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--ink2);cursor:pointer;transition:.14s}
  .iconbtn:hover{border-color:var(--ink2);color:var(--ink)}
  .iconbtn svg{width:16px;height:16px}
  .iconbtn .icon-sun{display:none}
  body.dark .iconbtn .icon-moon{display:none}
  body.dark .iconbtn .icon-sun{display:inline-block}
  .tray-actions{display:flex;align-items:center;gap:10px;margin:0 0 11px}

  body.dark{
    --bg:#151517;--soft:#1b1b1e;--hover:#202024;
    --ink:#ededed;--ink2:#a6a6a6;--muted:#6f6f6f;
    --line:#2b2b2f;--line2:#232327;
    --p1:#d07c57;--p2:#5ba3b6;--p3:#c89b50;--ops:#8a8a86;
    --p1-s:rgba(208,124,87,.16);--p2-s:rgba(91,163,182,.16);--p3-s:rgba(200,155,80,.16);--ops-s:rgba(255,255,255,.06);
    background:var(--bg);
  }
  body.dark .block:hover{box-shadow:0 1px 0 rgba(0,0,0,.2),0 2px 10px rgba(0,0,0,.3);border-color:#3a3a40}
  body.dark .drawer{box-shadow:-18px 0 50px rgba(0,0,0,.5)}
  body.dark .ghost{box-shadow:0 8px 24px rgba(0,0,0,.5)}

  :focus-visible{outline:2px solid var(--p2);outline-offset:2px}
  @media (max-width:640px){
    .wrap{padding:32px 18px 90px}
    .progress{min-width:0}.progress .row1,.progress .row2{justify-content:flex-start}
    .addrow input{min-width:120px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">
  <header class="page-head">
    <h1>500 Global Content Calendar</h1>
    <div class="page-sub">June 8 – August 21, 2026</div>
  </header>
  <hr class="rule">
  <div class="tray-wrap">
    <div class="tray-head">
      <div class="th-left">
        <div class="eyebrow">drag &rarr; calendar</div>
        <div class="th-hint">Drag a block onto a day &middot; tap <b>&#10003;</b> to check off &middot; <b>&times;</b> to delete &middot; click a day to flag a ship day</div>
      </div>
      <div class="addrow">
        <select id="newPillar">
          <option value="p1">Grassroots</option>
          <option value="p2">Authority</option>
          <option value="doc">Documentary</option>
          <option value="ops">Sync / review</option>
        </select>
        <input id="newText" placeholder="New video idea…" maxlength="120">
        <button class="btn" id="addIdea">Add</button>
      </div>
    </div>
    <div class="actions tray-actions">
      <button class="iconbtn" id="themeToggle" title="Toggle light / dark" aria-label="Toggle light or dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <span id="saved" class="saved-tag">saved</span>
    </div>
    <div class="tray dropzone" id="tray" data-cell="tray"></div>
  </div>

  <div class="cal-scroll">
    <div class="cal" id="cal">
      <div class="colhead">
        <div class="ch first">Week</div>
        <div class="ch">Mon</div><div class="ch">Tue</div><div class="ch">Wed</div><div class="ch">Thu</div><div class="ch">Fri</div>
      </div>
    </div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true" role="dialog" aria-label="Edit project">
  <button class="drawer-x" id="drawerX" title="Close">×</button>
  <div class="d-meta" id="dMeta"></div>
  <div class="d-label">Title</div>
  <input class="d-title" id="dTitle" maxlength="160">
  <div class="d-label">Description</div>
  <textarea class="d-desc" id="dDesc" placeholder="A short description of the project — angle, subject, location, gear, anything to remember…"></textarea>
  <div class="d-foot">
    <button class="btn warn" id="dDelete">Delete block</button>
    <span class="d-saved" id="dSaved">saved</span>
  </div>
</aside>

<script>
const THEME_KEY="ccp:theme";
try{if(localStorage.getItem(THEME_KEY)==="dark")document.body.classList.add("dark");}catch(e){}
function setTheme(dark){
  document.body.classList.toggle("dark",dark);
  try{localStorage.setItem(THEME_KEY,dark?"dark":"light");}catch(e){}
}
const P={p1:"Grassroots",p2:"Authority",doc:"Documentary",ops:"Sync / review"};
const DAYS=["MON","TUE","WED","THU","FRI"];

const CURRENT_WEEK=1;

 [[["ops","Monday sync — shift to post mode"],["doc","Footage logged + transcribed; build selects bin"]],

/* ---------- State ---------- */
let blocks={}, order=[], ship={}, ideaCounter=0;
const KEY="ccp:plan:v3";

function buildSeed(){
  blocks={};order=[];ship={};
  SEED.forEach((wk,wi)=>{
    wk.forEach((day,di)=>day.forEach((t,ti)=>{
      const id=`s-${wi+1}-${di}-${ti}`;
      blocks[id]={pillar:t[0],text:t[1],cell:`c-${wi+1}-${di}`,done:false,desc:""};
      order.push(id);
    }));
    ship[`c-${wi+1}-2`]="p1";
    ship[`c-${wi+1}-4`]="p2";
  });
}
function readLocal(){try{const v=localStorage.getItem(KEY);if(v)return JSON.parse(v);}catch(e){}return null;}
async function readPlan(){
  const local=readLocal();
  if(local)return local;
  try{const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}catch(e){}
  return null;
}
async function load(){
  const d=await readPlan();
  if(d){blocks=d.blocks||{};order=d.order||Object.keys(blocks);ship=d.ship||{};ideaCounter=d.ideaCounter||0;return;}
  buildSeed();
}
function save(){
  const json=JSON.stringify({blocks,order,ship,ideaCounter});
  let ok=false;
  try{localStorage.setItem(KEY,json);ok=true;}catch(e){}
  try{if(window.storage&&typeof window.storage.set==="function"){const p=window.storage.set(KEY,json);if(p&&p.catch)p.catch(()=>{});ok=true;}}catch(e){}
  flashSaved(ok);
}
function flashSaved(ok){
  const s=document.getElementById("saved");if(!s)return;
  if(ok===false){s.textContent="not saved — use Export";s.style.color="var(--p1)";return;}
  s.style.color="";s.textContent="saving…";clearTimeout(s._t);s._t=setTimeout(()=>{s.textContent="saved";},280);
}

/* ---------- Build calendar ---------- */
function buildCal(){
  const cal=document.getElementById("cal");
  WEEKMETA.forEach(w=>{
    const row=document.createElement("div");
    row.className="row"+(w.n===CURRENT_WEEK?" now":"");
    const thisWk=w.n===CURRENT_WEEK?'<span class="wk-this">this week</span>':"";
    let html=`<div class="wk-label">
        <div class="wk-no">W${String(w.n).padStart(2,"0")}${thisWk}</div>
        <div class="wk-dates">${w.dates[0]} – ${w.dates[1]}</div>
      </div>`;
    DAYS.forEach((dn,di)=>{
      const cid=`c-${w.n}-${di}`;
      html+=`<div class="cell dropzone" id="${cid}" data-cell="${cid}">
          <div class="cell-head"><span class="dn">${dn}</span><span class="ship-badge"></span></div>
          <div class="cell-body" id="body-${cid}"></div>
          <div class="cell-hint">click to flag ship day</div>
        </div>`;
    });
    row.innerHTML=html;
    cal.appendChild(row);
  });
  document.querySelectorAll(".cell").forEach(c=>{
    c.addEventListener("click",e=>{
      if(e.target.closest(".block"))return;
      const cid=c.dataset.cell, cur=ship[cid]||"";
      const next=SHIP_CYCLE[(SHIP_CYCLE.indexOf(cur)+1)%SHIP_CYCLE.length];
      if(next)ship[cid]=next;else delete ship[cid];
      applyShip();save();
    });
  });
}
function applyShip(){
  document.querySelectorAll(".cell").forEach(c=>{
    const cid=c.dataset.cell,s=ship[cid];
    c.classList.remove("ship-p1","ship-p2","ship-doc");
    const badge=c.querySelector(".ship-badge");
    if(s){c.classList.add("ship-"+s);badge.textContent=SHIP_LABEL[s];}
    else badge.textContent="";
  });
}

/* ---------- Blocks ---------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function makeBlock(id){
  const b=blocks[id];
  const el=document.createElement("div");
  el.className=`block ${b.pillar}${b.done?" done":""}`;
  el.dataset.id=id;
  const note=b.desc&&b.desc.trim()?`<span class="bnote" title="Has a description"></span>`:"";
  el.innerHTML=`<span class="box" title="Mark done">✓</span>
    <span class="btxt"><span class="pill">${P[b.pillar]}</span>${esc(b.text)}${note}</span>
    <button class="rm" title="Delete">×</button>`;
  el.querySelector(".box").addEventListener("click",ev=>{ev.stopPropagation();b.done=!b.done;renderBlocks();save();});
  el.querySelector(".rm").addEventListener("click",ev=>{ev.stopPropagation();delete blocks[id];order=order.filter(x=>x!==id);renderBlocks();save();});
  el.addEventListener("pointerdown",ev=>onDown(ev,el,id));
  return el;
}
function renderBlocks(){
  document.querySelectorAll(".cell-body").forEach(b=>b.innerHTML="");
  const tray=document.getElementById("tray");tray.innerHTML="";
  order=order.filter(id=>blocks[id]);
  Object.keys(blocks).forEach(id=>{if(!order.includes(id))order.push(id);});
  order.forEach(id=>{
    const b=blocks[id];if(!b)return;
    const zone=b.cell==="tray"?tray:document.getElementById("body-"+b.cell);
    if(zone)zone.appendChild(makeBlock(id));
    else{b.cell="tray";tray.appendChild(makeBlock(id));}
  });
  tray.classList.toggle("empty",tray.children.length===0);
}

/* ---------- Pointer drag ---------- */
let drag=null, lastTapEl=null, lastTapTime=0;
function onDown(e,el,id){
  if(e.target.closest(".box")||e.target.closest(".rm"))return;
  if(e.button&&e.button!==0)return;
  const r=el.getBoundingClientRect();
  drag={id,el,sx:e.clientX,sy:e.clientY,ox:e.clientX-r.left,oy:e.clientY-r.top,w:r.width,moved:false,ghost:null,zone:null};
  el.setPointerCapture(e.pointerId);
  el.addEventListener("pointermove",onMove);
  el.addEventListener("pointerup",onUp);
  el.addEventListener("pointercancel",onUp);
}
function onMove(e){
  if(!drag)return;
  const dx=e.clientX-drag.sx,dy=e.clientY-drag.sy;
  if(!drag.moved&&Math.hypot(dx,dy)<6)return;
  if(!drag.moved){
    drag.moved=true;drag.el.classList.add("dragging");
    const g=drag.el.cloneNode(true);g.className=drag.el.className.replace("dragging","").trim()+" ghost";
    g.style.width=drag.w+"px";document.body.appendChild(g);drag.ghost=g;
  }
  drag.ghost.style.left=(e.clientX-drag.ox)+"px";
  drag.ghost.style.top=(e.clientY-drag.oy)+"px";
  const under=document.elementFromPoint(e.clientX,e.clientY);
  const zone=under?under.closest(".dropzone"):null;
  document.querySelectorAll(".dropzone.over").forEach(z=>z.classList.remove("over"));
  if(zone)zone.classList.add("over");
  drag.zone=zone;
}
function onUp(){
  if(!drag)return;
  drag.el.removeEventListener("pointermove",onMove);
  drag.el.removeEventListener("pointerup",onUp);
  drag.el.removeEventListener("pointercancel",onUp);
  const moved=drag.moved,zone=drag.zone,id=drag.id;
  if(moved&&zone){blocks[id].cell=zone.dataset.cell;order=order.filter(x=>x!==id);order.push(id);save();}
  if(drag.ghost)drag.ghost.remove();
  document.querySelectorAll(".dropzone.over").forEach(z=>z.classList.remove("over"));
  if(drag.el)drag.el.classList.remove("dragging");
  drag=null;
  if(moved){renderBlocks();return;}
  const now=Date.now();
  if(lastTapEl===id && now-lastTapTime<330){lastTapEl=null;openEditor(id);}
  else{lastTapEl=id;lastTapTime=now;}
}

/* ---------- Editor panel ---------- */
const COLOR={p1:"var(--p1)",p2:"var(--p2)",doc:"var(--p3)",ops:"var(--ops)"};
let editingId=null, descT=null;
function locText(cell){
  if(cell==="tray")return "Unscheduled";
  const m=cell.match(/^c-(\d+)-(\d+)$/);
  if(!m)return "";
  const w=WEEKMETA[+m[1]-1];
  const dayNames=["Mon","Tue","Wed","Thu","Fri"];
  return `Week ${m[1]} · ${dayNames[+m[2]]} · ${w?w.dates[0]:""}`;
}
function openEditor(id){
  const b=blocks[id];if(!b)return;
  editingId=id;
  const meta=document.getElementById("dMeta");
  meta.innerHTML=`<span class="sw" style="background:${COLOR[b.pillar]}"></span>${P[b.pillar]} <span class="loc">· ${locText(b.cell)}</span>`;
  document.getElementById("dTitle").value=b.text;
  document.getElementById("dDesc").value=b.desc||"";
  document.getElementById("dSaved").textContent="saved";
  document.getElementById("scrim").classList.add("open");
  const dr=document.getElementById("drawer");dr.classList.add("open");dr.setAttribute("aria-hidden","false");
  setTimeout(()=>document.getElementById("dDesc").focus(),120);
}
function closeEditor(){
  editingId=null;
  document.getElementById("scrim").classList.remove("open");
  const dr=document.getElementById("drawer");dr.classList.remove("open");dr.setAttribute("aria-hidden","true");
  renderBlocks();
}
function editorInput(){
  if(!editingId||!blocks[editingId])return;
  blocks[editingId].text=document.getElementById("dTitle").value;
  blocks[editingId].desc=document.getElementById("dDesc").value;
  save();
  const ds=document.getElementById("dSaved");ds.textContent="saving…";clearTimeout(descT);descT=setTimeout(()=>ds.textContent="saved",260);
}

/* ---------- Actions ---------- */
function addIdea(){
  const txt=document.getElementById("newText").value.trim();if(!txt)return;
  const pil=document.getElementById("newPillar").value,id="n-"+(++ideaCounter);
  blocks[id]={pillar:pil,text:txt,cell:"tray",done:false,desc:""};order.push(id);
  document.getElementById("newText").value="";renderBlocks();save();
}
function copySummary(){
  let out=`500 AI Industry Lab — Content Calendar\nJun 8 – Aug 21, 2026\n`;
  WEEKMETA.forEach(w=>{
    out+=`\nW${String(w.n).padStart(2,"0")} · ${w.dates[0]}–${w.dates[1]} · ${PHASE_NAME[w.phase]}${w.gate?" · "+w.gate:""}\n`;
    DAYS.forEach((dn,di)=>{
      const cid=`c-${w.n}-${di}`,items=order.filter(id=>blocks[id]&&blocks[id].cell===cid);
      const sf=ship[cid]?` [${SHIP_LABEL[ship[cid]]} SHIP]`:"";
      if(items.length||ship[cid]){out+=`  ${dn}${sf}\n`;items.forEach(id=>{const b=blocks[id];out+=`    ${b.done?"[x]":"[ ]"} (${P[b.pillar]}) ${b.text}\n`;});}
    });
  });
  const tray=order.filter(id=>blocks[id]&&blocks[id].cell==="tray");
  if(tray.length){out+=`\nUnscheduled:\n`;tray.forEach(id=>{const b=blocks[id];out+=`  • (${P[b.pillar]}) ${b.text}\n`;});}
  copyText(out,"copy","Copied");
}
function exportPlan(){copyText(JSON.stringify({blocks,order,ship,ideaCounter}),"export","Copied JSON");}
function importPlan(){
  const v=prompt("Paste an exported plan (JSON):");if(!v)return;
  try{const d=JSON.parse(v);blocks=d.blocks||{};order=d.order||Object.keys(blocks);ship=d.ship||{};ideaCounter=d.ideaCounter||0;renderBlocks();applyShip();save();}
  catch(e){alert("That didn't look like a valid plan.");}
}
function copyText(t,btnId,msg){
  const done=()=>flash(btnId,msg);
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(done,()=>fb());
  else fb();
  function fb(){const a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();try{document.execCommand("copy");done();}catch(e){}a.remove();}
}
function flash(btnId,msg){const b=document.getElementById(btnId),o=b.textContent;b.textContent=msg;setTimeout(()=>b.textContent=o,1100);}

/* ---------- Init ---------- */
(async function(){
  await load();
  buildCal();renderBlocks();applyShip();
  document.getElementById("addIdea").addEventListener("click",addIdea);
  document.getElementById("newText").addEventListener("keydown",e=>{if(e.key==="Enter")addIdea();});
  document.getElementById("themeToggle").addEventListener("click",()=>setTheme(!document.body.classList.contains("dark")));
  document.getElementById("scrim").addEventListener("click",closeEditor);
  document.getElementById("drawerX").addEventListener("click",closeEditor);
  document.getElementById("dTitle").addEventListener("input",editorInput);
  document.getElementById("dDesc").addEventListener("input",editorInput);
  document.getElementById("dDelete").addEventListener("click",()=>{
    if(editingId&&blocks[editingId]){delete blocks[editingId];order=order.filter(x=>x!==editingId);save();}
    closeEditor();
  });
  document.addEventListener("keydown",e=>{if(e.key==="Escape"&&editingId)closeEditor();});
})();
</script>
